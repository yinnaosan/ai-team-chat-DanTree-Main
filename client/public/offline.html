<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>离线中 — DanTree</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663340309886/Sfk3bwgkEZLNATmH8kTpez/logo-32_d6c6c55d.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663340309886/Sfk3bwgkEZLNATmH8kTpez/logo-192_8547d1ff.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 28px;
      position: relative;
    }

    .icon-wrap img {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      opacity: 0.9;
    }

    /* Offline badge */
    .icon-wrap::after {
      content: "✕";
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 22px;
      height: 22px;
      background: #ef4444;
      border-radius: 50%;
      border: 2px solid #1a1a1a;
      font-size: 11px;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 18px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f5f5f5;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      text-decoration: none;
    }

    .btn:hover { opacity: 0.85; }

    .status {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      animation: pulse 2s infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <img
        src="https://d2xsxph8kpxj0f.cloudfront.net/310519663340309886/Sfk3bwgkEZLNATmH8kTpez/logo-192_8547d1ff.png"
        alt="DanTree"
      />
    </div>

    <h1>当前处于离线状态</h1>
    <p>
      无法连接到 DanTree。<br />
      请检查您的网络连接后重试。
    </p>

    <button class="btn" onclick="tryReconnect()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M3 21v-5h5"/>
      </svg>
      重新连接
    </button>

    <p class="status">
      <span class="dot"></span>
      网络连接已中断
    </p>
  </div>

  <script>
    function tryReconnect() {
      window.location.reload();
    }

    // Auto-retry when network comes back
    window.addEventListener("online", function() {
      window.location.reload();
    });
  </script>
</body>
</html>
